name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # No Ollama runs on the CI box, so the two model-backed tests and the DeepEval
      # pole-naming eval skip themselves; the deterministic suite is what gates here.
      - name: Run tests
        run: pytest -q

  lint:
    name: ruff
    runs-on: ubuntu-latest
    # A lint or format violation blocks merging, exactly like a failing test
    # (coding standard, Rule 17). Both checks must exit 0 for this job to pass.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check standpoint tests
      - name: Format check
        run: ruff format --check standpoint tests
