# Standpoint — localized LLM prompt templates.
# Language is auto-detected from the table's column names (langdetect); the
# detected language drives the pole names and the written analysis so the whole
# deliverable comes out in the table's own language. Supported: en, fr, es.
#
# Placeholders (Python str.format): {glossary} {left} {right} {bottom} {top}
# for axis_prompt; {left} {right} {bottom} {top} {reference} {best} {worst}
# {innovative} {trustworthy} {leaderboard} for narrative_prompt. JSON braces are
# escaped as {{ }}.

en:
  noun_prompt: |
    Give the singular and plural of EXACTLY this word, in English, capitalized, without
    replacing it by a synonym: "{word}".
    Reply as JSON: {{"singular": "...", "plural": "..."}}.
  glossary_prefix: "Glossary — translate these to plain words, never output the acronym: "
  axis_prompt: |
    You are naming the four poles of a 2D map whose two axes are weighted
    combinations of the input criteria. Every criterion is rated higher-is-better:
    a higher value always means more of a good thing.

    Each label names a POSITIVE QUALITY — a strength an approach at that end can be
    praised for. Give a concise label of ONE to THREE real English words. Rules:
    - ALWAYS a positive quality. NEVER a drawback, cost, or negative. Forbidden
      examples: 'High Cost', 'Expensive', 'Slow', 'Complex', 'Insecure'. If a
      criterion is an inverse quantity (cost, price, latency, errors) where a high
      rating means LESS of it, name the benefit instead ('Affordable', 'Fast',
      'Reliable', 'Simple', 'Secure').
    - The four labels are four DIFFERENT positive qualities — never an opposite pair
      or antonyms (not 'Affordable' and 'Expensive', not 'Fast' and 'Slow'), and
      never reuse a word across labels.
    - Never output an acronym or abbreviation — spell out the idea.
    - Write the labels in English.

    Each pole below lists the criteria that approaches THERE score highest on — name
    the shared positive quality of that list:
    {glossary}LEFT pole — strongest at: {left}
    RIGHT pole — strongest at: {right}
    BOTTOM pole — strongest at: {bottom}
    TOP pole — strongest at: {top}

    Reply as JSON: {{"left": "<label>", "right": "<label>", "bottom": "<label>", "top": "<label>"}}.
  narrative_prompt: |
    Write 4-6 sentences of precise, sober analysis of a positioning map, in English.
    The horizontal axis runs from '{left}' (left) to '{right}' (right); the vertical
    from '{bottom}' (bottom) to '{top}' (top). The reference '{reference}' leads at
    the top-right. Best={best}, worst={worst}, most innovative={innovative}, most
    trustworthy={trustworthy}. Leaderboard by combined score: {leaderboard}. Explain
    what the axes mean, where the reference wins, and which clusters stand out. No
    acronyms. Plain prose, no bullet lists.

fr:
  noun_prompt: |
    Donnez le singulier et le pluriel EXACTEMENT de ce mot, en français, avec une
    majuscule, sans le remplacer par un synonyme : « {word} ».
    Répondez en JSON : {{"singular": "...", "plural": "..."}}.
  glossary_prefix: "Glossaire — traduisez en mots simples, n'affichez jamais l'acronyme : "
  axis_prompt: |
    Vous nommez les quatre pôles d'une carte 2D dont les deux axes sont des
    combinaisons pondérées des critères d'entrée. Chaque critère est noté « plus
    c'est haut, mieux c'est » : une valeur plus élevée signifie toujours plus d'une
    bonne chose.

    Chaque étiquette nomme une QUALITÉ POSITIVE — une force pour laquelle une
    approche de ce côté peut être louée. Donnez une étiquette de UN à TROIS vrais
    mots français. Règles :
    - TOUJOURS une qualité positive. JAMAIS un inconvénient, un coût ni un négatif.
      Exemples interdits : « Coût élevé », « Cher », « Lent », « Complexe ». Si un
      critère est une quantité inverse (coût, prix, latence, erreurs) où une note
      élevée signifie MOINS, nommez plutôt le bénéfice (« Abordable », « Rapide »,
      « Fiable », « Simple », « Sécurisé »).
    - Les quatre étiquettes sont quatre qualités positives DIFFÉRENTES — jamais une
      paire opposée ni des antonymes (pas « Abordable » et « Cher », pas « Rapide »
      et « Lent »), et ne réutilisez jamais un mot d'une étiquette à l'autre.
    - N'affichez jamais d'acronyme ni d'abréviation — explicitez l'idée.
    - Rédigez les étiquettes en français.

    Chaque pôle ci-dessous liste les critères où les approches obtiennent les
    meilleures notes — nommez la qualité positive commune de cette liste :
    {glossary}Pôle GAUCHE — les plus fortes en : {left}
    Pôle DROIT — les plus fortes en : {right}
    Pôle BAS — les plus fortes en : {bottom}
    Pôle HAUT — les plus fortes en : {top}

    Répondez en JSON : {{"left": "<label>", "right": "<label>", "bottom": "<label>", "top": "<label>"}}.
  narrative_prompt: |
    Rédigez 4 à 6 phrases d'analyse précise et sobre d'une carte de positionnement,
    en français. L'axe horizontal va de « {left} » (gauche) à « {right} » (droite) ;
    l'axe vertical de « {bottom} » (bas) à « {top} » (haut). La référence « {reference} »
    domine en haut à droite. Meilleur={best}, pire={worst}, plus innovant={innovative},
    plus digne de confiance={trustworthy}. Classement par score combiné : {leaderboard}.
    Expliquez le sens des axes, où la référence l'emporte et quels groupes se
    distinguent. Pas d'acronymes. Prose simple, sans listes à puces.

es:
  noun_prompt: |
    Da el singular y el plural EXACTAMENTE de esta palabra, en español, con mayúscula,
    sin reemplazarla por un sinónimo: «{word}».
    Responde en JSON: {{"singular": "...", "plural": "..."}}.
  glossary_prefix: "Glosario — traduce a palabras simples, nunca muestres la sigla: "
  axis_prompt: |
    Estás nombrando los cuatro polos de un mapa 2D cuyos dos ejes son combinaciones
    ponderadas de los criterios de entrada. Cada criterio se valora « cuanto más
    alto, mejor » : un valor más alto siempre significa más de algo bueno.

    Cada etiqueta nombra una CUALIDAD POSITIVA — una fortaleza por la que una
    propuesta de ese extremo puede ser elogiada. Da una etiqueta de UNA a TRES
    palabras reales en español. Reglas:
    - SIEMPRE una cualidad positiva. NUNCA un inconveniente, un coste ni un negativo.
      Ejemplos prohibidos: « Coste alto », « Caro », « Lento », « Complejo ». Si un
      criterio es una cantidad inversa (coste, precio, latencia, errores) donde una
      puntuación alta significa MENOS, nombra el beneficio (« Asequible », « Rápido »,
      « Fiable », « Sencillo », « Seguro »).
    - Las cuatro etiquetas son cuatro cualidades positivas DIFERENTES — nunca un par
      opuesto ni antónimos (no « Asequible » y « Caro », no « Rápido » y « Lento »),
      y nunca reutilices una palabra entre etiquetas.
    - Nunca muestres una sigla ni una abreviatura — explica la idea.
    - Escribe las etiquetas en español.

    Cada polo abajo lista los criterios donde las propuestas puntúan más alto —
    nombra la cualidad positiva común de esa lista:
    {glossary}Polo IZQUIERDO — más fuertes en: {left}
    Polo DERECHO — más fuertes en: {right}
    Polo INFERIOR — más fuertes en: {bottom}
    Polo SUPERIOR — más fuertes en: {top}

    Responde en JSON: {{"left": "<label>", "right": "<label>", "bottom": "<label>", "top": "<label>"}}.
  narrative_prompt: |
    Escribe de 4 a 6 frases de análisis preciso y sobrio de un mapa de posicionamiento,
    en español. El eje horizontal va de « {left} » (izquierda) a « {right} » (derecha);
    el vertical de « {bottom} » (abajo) a « {top} » (arriba). La referencia « {reference} »
    lidera arriba a la derecha. Mejor={best}, peor={worst}, más innovador={innovative},
    más fiable={trustworthy}. Clasificación por puntuación combinada: {leaderboard}.
    Explica qué significan los ejes, dónde gana la referencia y qué grupos destacan.
    Sin siglas. Prosa sencilla, sin listas con viñetas.
